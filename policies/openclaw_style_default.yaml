  web_fetch: PASS_WITH_URL_RECEIPT
  browser_login: HOLD_HUMAN_APPROVAL_REQUIRED
  browser_form_submit: HOLD_OR_BLOCK_EXTERNAL_ACTION
  exec_readonly: PASS_SANDBOXED_OR_HOLD_POLICY
  exec_write: HOLD_DIFF_REVIEW_REQUIRED
  message_send: HOLD_HUMAN_CONFIRM
  email_send: HOLD_HUMAN_CONFIRM
  file_delete: BLOCK_UNLESS_BACKUP_AND_APPROVAL
